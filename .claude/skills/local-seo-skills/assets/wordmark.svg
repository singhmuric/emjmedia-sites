  <text x="600" y="165"
        text-anchor="middle"
        font-family="Plus Jakarta Sans"
        font-weight="800"
        font-size="140"
        letter-spacing="-4.2"
        fill="#0F172A">Local <tspan fill="#16A34A">SEO</tspan> Skills</text>
</svg>
